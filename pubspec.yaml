name: cashback_rewards_points_maximiser
description: High fidelity Cashback and Rewards Points Maximiser mobile app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^6.2.1
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.1.0
  http: ^1.2.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/login_hero.png
    - assets/images/rewards_card.png
    - assets/images/app_logo.png
    - assets/images/signup_hero.png

  